<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E50914" />
      <stop offset="100%" stop-color="#B81D24" />
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3F3F3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="32" y="32" width="448" height="448" rx="110" fill="url(#bgGrad)" />

  <!-- Outer Film Reel / Circle Accent -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-dasharray="32 16" opacity="0.4" />

  <!-- Play Button Core -->
  <path d="M208 160 L352 256 L208 352 Z" fill="url(#playGrad)" filter="url(#glow)" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
</svg>